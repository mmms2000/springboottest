<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .topbar { background:#343a40; color:white; height:55px; }
        .sidebar { width:220px; background:#f8f9fa; min-height:100vh; }
        .sidebar .nav-link { color:#0d6efd; border-radius: .5rem; padding:.5rem .75rem; }
        .sidebar .nav-link.active { background:#0d6efd; color:white; }
        .content { padding:30px; }
        .card-soft { border:1px solid #e5e7eb; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar d-flex align-items-center justify-content-between px-3">
    <div class="mono">
        <span sec:authentication="name">admin@admin</span>
        &nbsp; with Role [
        <span th:each="a, stat : ${#authentication.authorities}"
              th:if="${a.authority.startsWith('ROLE_')}"
              th:text="${#strings.replace(a.authority, 'ROLE_', '')} + (${stat.last} ? '' : ', ')">
            ADMIN
        </span>
        ]
    </div>

    <form th:action="@{/logout}" method="post" class="m-0">
        <button type="submit" class="btn btn-link text-white text-decoration-none">Logout</button>
    </form>
</div>

<div class="d-flex">
    <!-- SIDEBAR -->
    <aside class="sidebar p-3">
        <nav class="nav flex-column gap-1">
            <a class="nav-link active" th:href="@{/admin/users}">Admin</a>
            <a class="nav-link" th:href="@{/user}">User</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-grow-1 content">
        <h1 class="mb-3">Admin panel</h1>

        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab"
                        data-bs-target="#tab-users" type="button" role="tab">
                    All Users
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                        data-bs-target="#tab-new" type="button" role="tab">
                    New User
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- ALL USERS TAB -->
            <div class="tab-pane fade show active" id="tab-users" role="tabpanel">
                <div class="card card-soft">
                    <div class="card-header bg-white"><b>All Users</b></div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped align-middle">
                                <thead>
                                <tr>
                                    <th style="width:70px;">ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th style="width:90px;">Age</th>
                                    <th>Email</th>
                                    <th style="width:160px;">Role</th>
                                    <th style="width:100px;">Edit</th>
                                    <th style="width:110px;">Delete</th>
                                </tr>
                                </thead>
                                <tbody id="usersTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- NEW USER TAB -->
            <div class="tab-pane fade" id="tab-new" role="tabpanel">
                <div class="card card-soft">
                    <div class="card-header bg-white"><b>Add new user</b></div>
                    <div class="card-body d-flex justify-content-center">

                        <form id="newUserForm" style="max-width:520px; width:100%;">

                            <div id="newUserError" class="alert alert-danger d-none"></div>

                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input id="newFirst" class="form-control"
                                       pattern="[A-Za-z]+" title="Letters only" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input id="newLast" class="form-control"
                                       pattern="[A-Za-z]+" title="Letters only" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Age</label>
                                <input id="newAge" class="form-control"
                                       type="number" min="1" max="120" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input id="newEmail" class="form-control" type="email" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input id="newPassword" class="form-control" type="password" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Role</label>
                                <select id="newRoles" class="form-select" multiple size="2" required>
                                    <option value="ROLE_ADMIN">ADMIN</option>
                                    <option value="ROLE_USER" selected>USER</option>
                                </select>
                                <div class="form-text">Hold Ctrl/⌘ to select multiple roles.</div>
                            </div>

                            <button type="submit" class="btn btn-success px-4">Add new user</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>


<!-- EDIT MODAL -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="editError" class="alert alert-danger d-none"></div>

                <div class="mb-3">
                    <label class="form-label">ID</label>
                    <input id="editId" class="form-control" type="text" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input id="editFirst" class="form-control" required pattern="[A-Za-z]+">
                </div>
                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input id="editLast" class="form-control" required pattern="[A-Za-z]+">
                </div>
                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input id="editAge" class="form-control" type="number" min="1" max="120" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input id="editEmail" class="form-control" type="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password (optional)</label>
                    <input id="editPassword" class="form-control" type="password"
                           placeholder="Leave empty to keep current">
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="editRoles" class="form-select" multiple size="2" required>
                        <option value="ROLE_ADMIN">ADMIN</option>
                        <option value="ROLE_USER">USER</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="updateUser()">Save changes</button>
            </div>
        </div>
    </div>
</div>


<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">ID</label>
                    <input id="delId" class="form-control" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input id="delFirst" class="form-control" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input id="delLast" class="form-control" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input id="delAge" class="form-control" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input id="delEmail" class="form-control" disabled>
                </div>
                <div class="text-muted small">This action cannot be undone.</div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-danger" onclick="deleteUser()">Delete</button>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ── helpers ───────────────────────────────────────────────────────────────

    function getSelectedRoles(selectId) {
        return Array.from(document.getElementById(selectId).selectedOptions)
            .map(o => o.value);
    }

    function setMultiSelect(selectEl, rolesArray) {
        for (const opt of selectEl.options) {
            opt.selected = rolesArray.includes(opt.value);
        }
    }

    function renderRoles(roles) {
        return roles
            .filter(r => r.startsWith('ROLE_'))
            .map(r => r.replace('ROLE_', ''))
            .join(', ');
    }

    function showError(elId, msg) {
        const el = document.getElementById(elId);
        el.textContent = msg;
        el.classList.remove('d-none');
    }

    function hideError(elId) {
        document.getElementById(elId).classList.add('d-none');
    }

    // ── load & render table ───────────────────────────────────────────────────

    async function loadUsers() {
        const res   = await fetch('/api/users');
        const users = await res.json();

        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';

        users.forEach(u => {
            tbody.innerHTML += `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.firstName}</td>
                    <td>${u.lastName}</td>
                    <td>${u.age}</td>
                    <td>${u.email}</td>
                    <td class="mono">[${renderRoles(u.roles)}]</td>
                    <td>
                        <button class="btn btn-info btn-sm text-white"
                                onclick="openEditModal(${u.id})">Edit</button>
                    </td>
                    <td>
                        <button class="btn btn-danger btn-sm"
                                onclick="openDeleteModal(${u.id}, '${u.firstName}',
                                '${u.lastName}', ${u.age}, '${u.email}')">Delete</button>
                    </td>
                </tr>`;
        });
    }

    // ── create user ───────────────────────────────────────────────────────────

    document.getElementById('newUserForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError('newUserError');

        const body = {
            firstName : document.getElementById('newFirst').value,
            lastName  : document.getElementById('newLast').value,
            age       : document.getElementById('newAge').value,
            email     : document.getElementById('newEmail').value,
            password  : document.getElementById('newPassword').value,
            roles     : getSelectedRoles('newRoles')
        };

        const res = await fetch('/api/users', {
            method  : 'POST',
            headers : { 'Content-Type': 'application/json' },
            body    : JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
            showError('newUserError', data.error || 'Error creating user');
            return;
        }

        document.getElementById('newUserForm').reset();
        document.querySelector('[data-bs-target="#tab-users"]').click();
        loadUsers();
    });

    // ── edit modal ────────────────────────────────────────────────────────────

    async function openEditModal(id) {
        hideError('editError');

        const res = await fetch(`/api/users/${id}`);
        const u   = await res.json();

        document.getElementById('editId').value       = u.id;
        document.getElementById('editFirst').value    = u.firstName;
        document.getElementById('editLast').value     = u.lastName;
        document.getElementById('editAge').value      = u.age;
        document.getElementById('editEmail').value    = u.email;
        document.getElementById('editPassword').value = '';
        setMultiSelect(document.getElementById('editRoles'), u.roles);

        new bootstrap.Modal(document.getElementById('editModal')).show();
    }

    async function updateUser() {
        hideError('editError');

        const id   = document.getElementById('editId').value;
        const body = {
            firstName : document.getElementById('editFirst').value,
            lastName  : document.getElementById('editLast').value,
            age       : document.getElementById('editAge').value,
            email     : document.getElementById('editEmail').value,
            password  : document.getElementById('editPassword').value,
            roles     : getSelectedRoles('editRoles')
        };

        const res = await fetch(`/api/users/${id}`, {
            method  : 'PUT',
            headers : { 'Content-Type': 'application/json' },
            body    : JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
            showError('editError', data.error || 'Error updating user');
            return;
        }

        bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();

        if (data.forceLogout) {
            window.location.href = '/logout';
            return;
        }

        loadUsers();
    }

    // ── delete modal ──────────────────────────────────────────────────────────

    function openDeleteModal(id, first, last, age, email) {
        document.getElementById('delId').value    = id;
        document.getElementById('delFirst').value = first;
        document.getElementById('delLast').value  = last;
        document.getElementById('delAge').value   = age;
        document.getElementById('delEmail').value = email;

        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    async function deleteUser() {
        const id = document.getElementById('delId').value;

        await fetch(`/api/users/${id}`, {
            method  : 'DELETE'
        });

        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
        loadUsers();
    }

    // ── init ──────────────────────────────────────────────────────────────────
    loadUsers();
</script>

</body>
</html>
