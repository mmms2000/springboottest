<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <!-- Bootstrap 5 (CSS) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .topbar { background:#343a40; color:white; height:55px; }
        .sidebar { width:220px; background:#f8f9fa; min-height:100vh; }
        .sidebar .nav-link { color:#0d6efd; border-radius: .5rem; padding:.5rem .75rem; }
        .sidebar .nav-link.active { background:#0d6efd; color:white; }
        .content { padding:30px; }
        .card-soft { border:1px solid #e5e7eb; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar d-flex align-items-center justify-content-between px-3">
    <div class="mono">
        <span sec:authentication="name">admin@admin</span>
        &nbsp; with Role [
        <span th:each="a, stat : ${#authentication.authorities}"
              th:if="${a.authority.startsWith('ROLE_')}"
              th:text="${#strings.replace(a.authority, 'ROLE_', '')} + (${stat.last} ? '' : ', ')">
            ADMIN
        </span>
        ]
    </div>

    <form th:action="@{/logout}" method="post" class="m-0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-link text-white text-decoration-none">Logout</button>
    </form>
</div>

<div class="d-flex">
    <!-- SIDEBAR -->
    <aside class="sidebar p-3">
        <nav class="nav flex-column gap-1">
            <a class="nav-link active" th:href="@{/admin/users}">Admin</a>
            <a class="nav-link" th:href="@{/user}">User</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-grow-1 content">
        <h1 class="mb-3">Admin panel</h1>

        <!-- TABS -->
        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active"
                        data-bs-toggle="tab"
                        data-bs-target="#tab-users"
                        type="button"
                        role="tab">
                    All Users
                </button>
            </li>

            <li class="nav-item" role="presentation">
                <button class="nav-link"
                        data-bs-toggle="tab"
                        data-bs-target="#tab-new"
                        type="button"
                        role="tab">
                    New User
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- ======================
                 ALL USERS TAB
                 ====================== -->
            <div class="tab-pane fade show active" id="tab-users" role="tabpanel">

                <div class="card card-soft">
                    <div class="card-header bg-white">
                        <b>All Users</b>
                    </div>

                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped align-middle">
                                <thead>
                                <tr>
                                    <th style="width:70px;">ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th style="width:90px;">Age</th>
                                    <th>Email</th>
                                    <th style="width:160px;">Role</th>
                                    <th style="width:100px;">Edit</th>
                                    <th style="width:110px;">Delete</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="u : ${users}">
                                    <td th:text="${u.id}">1</td>
                                    <td th:text="${u.firstName}">Admin</td>
                                    <td th:text="${u.lastName}">Admin</td>
                                    <td th:text="${u.age}">0</td>
                                    <td th:text="${u.email}">admin@admin</td>

                                    <td class="mono">
                                        <span>[</span>
                                        <span th:if="${u.roles != null}">
                                            <span th:each="r, st : ${u.roles}">
                                                <span th:text="${#strings.replace(r.name,'ROLE_','')}">USER</span>
                                                <span th:if="${!st.last}">, </span>
                                            </span>
                                        </span>
                                        <span th:if="${u.roles == null}">NO_ROLES</span>
                                        <span>]</span>
                                    </td>

                                    <td>
                                        <button type="button"
                                                class="btn btn-info btn-sm text-white"
                                                data-bs-toggle="modal"
                                                data-bs-target="#editModal"
                                                th:attr="data-id=${u.id},
                                                         data-first=${u.firstName},
                                                         data-last=${u.lastName},
                                                         data-age=${u.age},
                                                         data-email=${u.email},
                                                         data-roles=${#strings.listJoin(u.roles.![name], ',')}">
                                            Edit
                                        </button>
                                    </td>

                                    <td>
                                        <button type="button"
                                                class="btn btn-danger btn-sm"
                                                data-bs-toggle="modal"
                                                data-bs-target="#deleteModal"
                                                th:attr="data-id=${u.id},
                                                         data-first=${u.firstName},
                                                         data-last=${u.lastName},
                                                         data-age=${u.age},
                                                         data-email=${u.email},
                                                         data-roles=${#strings.listJoin(u.roles.![name], ',')}">
                                            Delete
                                        </button>
                                    </td>
                                </tr>
                                </tbody>

                            </table>
                        </div>

                    </div>
                </div>
            </div>

            <!-- ======================
                 NEW USER TAB
                 ====================== -->
            <div class="tab-pane fade" id="tab-new" role="tabpanel">

                <div class="card card-soft">
                    <div class="card-header bg-white">
                        <b>Add new user</b>
                    </div>

                    <div class="card-body d-flex justify-content-center">

                        <form th:action="@{/admin/users}"
                              th:object="${user}"
                              method="post"
                              style="max-width:520px; width:100%;">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">

                            <div class="alert alert-danger" th:if="${#fields.hasAnyErrors()}">
                                <div th:each="e : ${#fields.errors('*')}" th:text="${e}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input class="form-control"
                                       th:field="*{firstName}"
                                       pattern="[A-Za-z]+"
                                       title="Letters only"
                                       required>
                                <div class="text-danger small"
                                     th:if="${#fields.hasErrors('firstName')}"
                                     th:errors="*{firstName}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input class="form-control"
                                       th:field="*{lastName}"
                                       pattern="[A-Za-z]+"
                                       title="Letters only"
                                       required>
                                <div class="text-danger small"
                                     th:if="${#fields.hasErrors('lastName')}"
                                     th:errors="*{lastName}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Age</label>
                                <input class="form-control"
                                       type="number"
                                       th:field="*{age}"
                                       min="1"
                                       max="120">
                                <div class="text-danger small"
                                     th:if="${#fields.hasErrors('age')}"
                                     th:errors="*{age}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input class="form-control"
                                       type="email"
                                       th:field="*{email}"
                                       required>
                                <div class="text-danger small"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input class="form-control"
                                       type="password"
                                       name="rawPassword"
                                       required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Role</label>
                                <select class="form-select"
                                        name="roleName"
                                        multiple
                                        size="2"
                                        required>
                                    <option value="ROLE_ADMIN">ADMIN</option>
                                    <option value="ROLE_USER" selected>USER</option>
                                </select>
                                <div class="form-text">Hold Ctrl/⌘ to select multiple roles.</div>
                            </div>

                            <button type="submit" class="btn btn-success px-4">
                                Add new user
                            </button>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </main>
</div>


<!-- =========================
     EDIT MODAL
     ========================= -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form id="editForm" method="post">
                <div class="modal-body">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label">ID</label>
                        <input id="editId" class="form-control" type="text" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input id="editFirst" class="form-control" name="firstName" required pattern="[A-Za-z]+">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input id="editLast" class="form-control" name="lastName" required pattern="[A-Za-z]+">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input id="editAge" class="form-control" type="number" name="age" min="1" max="120">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input id="editEmail" class="form-control" type="email" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">New Password (optional)</label>
                        <input class="form-control" type="password" name="newPassword" placeholder="Leave empty to keep current">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select id="editRoles" class="form-select" name="roleName" multiple size="2" required>
                            <option value="ROLE_ADMIN">ADMIN</option>
                            <option value="ROLE_USER">USER</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save changes</button>
                </div>
            </form>

        </div>
    </div>
</div>


<!-- =========================
     DELETE MODAL
     ========================= -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form id="deleteForm" method="post">
                <div class="modal-body">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label">ID</label>
                        <input id="delId" class="form-control" type="text" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input id="delFirst" class="form-control" type="text" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input id="delLast" class="form-control" type="text" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input id="delAge" class="form-control" type="text" disabled>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input id="delEmail" class="form-control" type="text" disabled>
                    </div>

                    <div class="text-muted small">This action cannot be undone.</div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </div>
            </form>

        </div>
    </div>
</div>


<!-- Bootstrap 5 (JS Bundle) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function setMultiSelect(selectEl, rolesCsv) {
        const roles = (rolesCsv || "").split(",").map(s => s.trim()).filter(Boolean);
        for (const opt of selectEl.options) {
            opt.selected = roles.includes(opt.value);
        }
    }

    // EDIT modal fill
    const editModalEl = document.getElementById('editModal');
    if (editModalEl) {
        editModalEl.addEventListener('show.bs.modal', (event) => {
            const btn = event.relatedTarget;
            if (!btn) return;

            const id = btn.getAttribute('data-id');
            const first = btn.getAttribute('data-first');
            const last = btn.getAttribute('data-last');
            const age = btn.getAttribute('data-age');
            const email = btn.getAttribute('data-email');
            const roles = btn.getAttribute('data-roles');

            document.getElementById('editId').value = id || "";
            document.getElementById('editFirst').value = first || "";
            document.getElementById('editLast').value = last || "";
            document.getElementById('editAge').value = age || "";
            document.getElementById('editEmail').value = email || "";

            setMultiSelect(document.getElementById('editRoles'), roles);

            document.getElementById('editForm').action = `/admin/users/${id}`;
        });
    }

    // DELETE modal fill
    const deleteModalEl = document.getElementById('deleteModal');
    if (deleteModalEl) {
        deleteModalEl.addEventListener('show.bs.modal', (event) => {
            const btn = event.relatedTarget;
            if (!btn) return;

            const id = btn.getAttribute('data-id');
            const first = btn.getAttribute('data-first');
            const last = btn.getAttribute('data-last');
            const age = btn.getAttribute('data-age');
            const email = btn.getAttribute('data-email');

            document.getElementById('delId').value = id || "";
            document.getElementById('delFirst').value = first || "";
            document.getElementById('delLast').value = last || "";
            document.getElementById('delAge').value = age || "";
            document.getElementById('delEmail').value = email || "";

            document.getElementById('deleteForm').action = `/admin/users/${id}/delete`;
        });
    }
</script>

</body>
</html>
