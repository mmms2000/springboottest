<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8" />
    <title>User Page</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .topbar { background: #2f343a; color: #fff; height: 56px; }
        .sidebar { width: 220px; background: #f4f6f8; min-height: calc(100vh - 56px); }
        .sidebar .nav-link { color: #0d6efd; }
        .sidebar .nav-link.active { background: #0d6efd; color: #fff; }
        .content { padding: 28px; }
        .card-soft { border: 1px solid #e5e7eb; }
        .role-pill { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar d-flex align-items-center justify-content-between px-3">
    <div class="mono">
        <span sec:authentication="name">user@user</span>
        &nbsp;
        <span>Role[</span>

        <th:block th:with="firstRole=${true}">
            <span th:each="a : ${#authentication.authorities}"
                  th:if="${a.authority.startsWith('ROLE_')}"
                  th:text="${#strings.capitalize(#strings.toLowerCase(#strings.replace(a.authority, 'ROLE_', '')))}">
                User
            </span>
        </th:block>

        <span>]</span>
    </div>

    <form th:action="@{/logout}" method="post" class="m-0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-link text-white text-decoration-none">Logout</button>
    </form>
</div>

<div class="d-flex">
    <!-- SIDEBAR -->
    <aside class="sidebar p-3">
        <nav class="nav flex-column">

            <a class="nav-link"
               sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin/users}">
                Admin
            </a>

            <a class="nav-link active"
               th:href="@{/user}">
                User
            </a>

        </nav>
    </aside>

    <!-- CONTENT -->
    <main class="flex-grow-1 content">
        <h1 class="mb-3">User Information Page</h1>

        <div class="card card-soft">
            <div class="card-header bg-white">
                <strong>About User</strong>
            </div>

            <div class="card-body">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th style="width:80px;">ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th style="width:90px;">Age</th>
                            <th>Email</th>
                            <th style="width:140px;">Roles</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr>
                            <td th:text="${user.id}">2</td>
                            <td th:text="${user.firstName}">User</td>
                            <td th:text="${user.lastName}">User</td>
                            <td th:text="${user.age}">38</td>
                            <td th:text="${user.email}">user@user</td>
                            <td class="role-pill">
                                <span>[</span>
                                <span th:each="r, st : ${user.roles}">
                  <span th:text="${#strings.replace(r.name,'ROLE_','')}">USER</span>
                  <span th:if="${!st.last}">, </span>
                </span>
                                <span>]</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </main>
</div>

</body>
</html>
