<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
</head>
<body>

<h2>Edit User</h2>

<form th:action="@{/admin/users/{id}(id=${user.id})}"
      th:object="${user}"
      method="post">

    <!-- CSRF -->
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}" />

    <!-- ID -->
    <input type="hidden" th:field="*{id}" />

    <!-- FIRST NAME -->
    <input th:field="*{firstName}"
           placeholder="First name"
           required />
    <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>

    <!-- LAST NAME -->
    <input th:field="*{lastName}"
           placeholder="Last name"
           required />
    <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>

    <!-- EMAIL -->
    <input th:field="*{email}"
           placeholder="Email"
           required
           type="email" />
    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

    <hr>

    <!-- ROLES -->
    <p><b>Roles</b></p>

    <label>
        <input type="checkbox"
               name="roleName"
               value="ROLE_USER"
               th:checked="${selectedRoles != null and selectedRoles.contains('ROLE_USER')}" />
        USER
    </label>

    <label>
        <input type="checkbox"
               name="roleName"
               value="ROLE_ADMIN"
               th:checked="${selectedRoles != null and selectedRoles.contains('ROLE_ADMIN')}" />
        ADMIN
    </label>

    <hr>

    <!-- OPTIONAL PASSWORD RESET -->
    <p><b>Reset/Change Password (optional)</b></p>
    <input type="password"
           name="newPassword"
           placeholder="New password (leave blank to keep current)" />

    <br><br>

    <button type="submit">Update</button>
</form>

<p><a th:href="@{/admin/users}">Back</a></p>

<!-- LOGOUT -->
<form th:action="@{/logout}" method="post">
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}" />
    <button type="submit">Logout</button>
</form>

</body>
</html>
